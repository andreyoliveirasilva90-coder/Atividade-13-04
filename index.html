<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header>
    <h1>🚀 TaskFlow Pro</h1>
    <button id="themeToggle">🌙</button>
  </header>

  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Nova tarefa..." />
    <input type="date" id="date">
    <input type="time" id="time">

    <select id="priority">
      <option value="alta">Alta</option>
      <option value="media">Média</option>
      <option value="baixa">Baixa</option>
    </select>

    <button onclick="addTask()">+</button>
  </div>

  <input type="text" id="search" placeholder="Buscar tarefa...">

  <div class="filters">
    <button onclick="filterTasks('all')">Todas</button>
    <button onclick="filterTasks('pending')">Pendentes</button>
    <button onclick="filterTasks('completed')">Concluídas</button>
  </div>

  <ul id="taskList"></ul>

  <p id="empty">Nenhuma tarefa ainda ✨</p>

</div>

<script src="script.js"></script>
</body>
</html>
